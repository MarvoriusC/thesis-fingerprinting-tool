<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thesis Fingerprint-Tool (MFA)</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 40px; background: #f8f9fa; color: #333; }
        .container { max-width: 850px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; margin-bottom: 5px;}
        p.subtitle { color: #7f8c8d; margin-bottom: 25px; }
        .metadata-controls { background: #eef2f5; padding: 20px; border-radius: 8px; margin-bottom: 25px; border: 1px solid #dce4ec; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .metadata-controls h3 { grid-column: span 2; margin-top: 0; color: #2c3e50; border-bottom: 2px solid #bdc3c7; padding-bottom: 10px; }
        label { font-weight: bold; margin-bottom: 5px; display: block; color: #34495e; font-size: 14px; }
        select { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #bdc3c7; font-size: 15px; background: white; }
        .full-width { grid-column: span 2; }
        .button-group { display: flex; gap: 15px; margin-bottom: 20px; }
        button { flex: 1; color: white; border: none; padding: 15px 20px; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; transition: 0.3s; }
        .btn-single { background: #2980b9; } .btn-single:hover { background: #3498db; }
        .btn-benchmark { background: #e67e22; } .btn-benchmark:hover { background: #f39c12; }
        .btn-download { background: #27ae60; width: 100%; margin-top: 15px; display: none; } .btn-download:hover { background: #2ecc71; }
        .status-box { padding: 15px; border-radius: 6px; font-weight: bold; text-align: center; font-size: 15px; transition: all 0.3s ease; }
        .ready { background: #ecf0f1; color: #7f8c8d; }
        .warning { background: #f1c40f; color: #fff; }
        .success { background: #2ecc71; color: #fff; }
        pre { background: #2c3e50; color: #ecf0f1; padding: 15px; border-radius: 6px; overflow-x: auto; font-size: 13px; max-height: 400px; }
    </style>
    <!-- FingerprintJS für die Font-Erkennung (Baseline) laden -->
    <script src="https://openfpcdn.io/fingerprintjs/v3/iife.min.js"></script>
</head>
<body>

<div class="container">
    <h1>Fingerprinting Data Collector</h1>
    <p class="subtitle">Erhebung von S, D und V Attributen für Adaptive Authentication (Thesis MFA).</p>

    <!-- METADATEN DROPDOWNS -->
    <div class="metadata-controls">
        <h3>Test-Setup konfigurieren</h3>
        
        <div>
            <label>Gerät:</label>
            <select id="metaDevice">
                <option value="Laptop_1">Haupt-Laptop</option>
                <option value="Desktop_PC">Desktop PC</option>
                <option value="Smartphone_1">Smartphone</option>
            </select>
        </div>

        <div>
            <label>Session-Nummer:</label>
            <select id="metaSession">
                <option value="S1">Session 1 (Start)</option>
                <option value="S2">Session 2 (Restart)</option>
                <option value="S3">Session 3 (Restart)</option>
                <option value="S4">Session 4 (PC Neustart)</option>
                <option value="S5">Session 5 (PC Neustart)</option>
            </select>
        </div>
        
        <div class="full-width">
            <label>Browser & Modus:</label>
            <select id="metaBrowser">
                <option value="Chrome_Normal">Chrome (Normal)</option>
                <option value="Edge_Normal">Edge (Normal)</option>
                <option value="Firefox_Normal">Firefox (Normal)</option>
                <option value="Brave_Normal">Brave (Normal)</option>
                <option value="Brave_Incognito">Brave (Inkognito)</option>
                <option value="Mullvad_Normal">Mullvad Browser</option>
                <option value="Tor_Normal">Tor Browser</option>
                <option value="Helium_Normal">Helium Browser</option>
            </select>
        </div>

        <div class="full-width">
            <label>Aktueller Störfaktor:</label>
            <select id="metaScenario">
                <option value="00_Baseline">00 - Baseline (Heimnetz / USB Maus / Ladekabel / LG Kühl Normal )</option>
                <option value="01_Netzwerk_VPN">01 - Proton VPN</option>
                <option value="02_Batteriesparmodus">02 - Ladekabel abschließen</option>
                <option value="03_Screen_Resize">03 - Fenstergröße manipuliert</option>
                <option value="04_Zoom_Level">04 - Zoom manipuliert</option>
                <option value="05_MOV_CPU">04 - .mov Video abspielen (CPU TEST)</option>
                <option value="06_Hardware_Accel_Off">06 - Hardwarebeschleunigung im Browser deaktiviert</option>
                <option value="07_Win_ClearType">07 - Windows ClearType deaktiviert</option>
            </select>
        </div>
    </div>

    <!-- BUTTONS -->
    <div class="button-group">
        <button id="startBtn" class="btn-single">1x Run (Nur S & V checken)</button>
        <button id="benchmarkBtn" class="btn-benchmark">100x Run (Für D-Auswertung)</button>
    </div>
    
    <div id="statusBox" class="status-box ready">Warte auf Eingabe...</div>

    <!-- OUTPUT -->
    <div id="resultContainer" style="display: none; margin-top: 20px;">
        <h3 style="color: #2c3e50;">Gesammelte Daten (Vorschau):</h3>
        <pre id="jsonOutput"></pre>
        <button id="downloadBtn" class="btn-download">JSON Herunterladen</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
